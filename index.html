<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e1a">
    <title>AI Hub - AI工具与模型信息大合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-hover: #243049;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --accent-light: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08), transparent 70%);
            top: -150px; right: -150px;
            pointer-events: none;
            z-index: 0;
        }

        /* Navigation - Desktop */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10, 14, 26, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 24px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .nav-logo svg {
            width: 24px; height: 24px;
        }

        /* Desktop tabs in top nav */
        .nav-tabs-desktop {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: none;
            white-space: nowrap;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .nav-tab.active {
            color: var(--accent-light);
            background: rgba(59, 130, 246, 0.1);
        }

        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .settings-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        /* Mobile Bottom Tab Bar */
        .mobile-tabs {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 1000;
            padding-bottom: var(--safe-bottom);
        }

        .mobile-tabs-inner {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 56px;
        }

        .mobile-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-tab svg {
            width: 22px; height: 22px;
        }

        .mobile-tab.active {
            color: var(--accent-light);
        }

        /* Main Content */
        .main {
            padding-top: 72px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Page Headers */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.25s;
            cursor: default;
        }

        .card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.08);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .card-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-light);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .tag.green { background: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.2); }
        .tag.purple { background: rgba(139, 92, 246, 0.1); color: #a78bfa; border-color: rgba(139, 92, 246, 0.2); }
        .tag.orange { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: rgba(245, 158, 11, 0.2); }
        .tag.red { background: rgba(239, 68, 68, 0.1); color: #f87171; border-color: rgba(239, 68, 68, 0.2); }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            margin-left: 6px;
        }

        .status-badge.hot { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        .status-badge.new { background: rgba(16, 185, 129, 0.1); color: #34d399; }

        .status-badge .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(59, 130, 246, 0.1);
        }

        .search-input {
            flex: 1;
            min-width: 160px;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }

        /* News Section */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: all 0.2s;
        }

        .news-item:hover { border-color: rgba(59, 130, 246, 0.3); }

        .news-date {
            flex-shrink: 0;
            text-align: center;
            min-width: 44px;
        }

        .news-date .month { font-size: 10px; color: var(--accent-light); text-transform: uppercase; font-weight: 600; }
        .news-date .day { font-size: 20px; font-weight: 700; }

        .news-content h3 { font-size: 14px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
        .news-content p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .news-source { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        /* Chat Section */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            height: calc(100dvh - 140px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-header .model-select {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar { background: var(--gradient-1); color: white; }
        .message.user .message-avatar { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message.assistant .message-bubble { background: var(--bg-secondary); border: 1px solid var(--border); }
        .message.user .message-bubble { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 42px;
            max-height: 100px;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .chat-input:focus { border-color: var(--accent); }
        .chat-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 42px; height: 42px;
            border-radius: 12px;
            border: none;
            background: var(--gradient-1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 { font-size: 18px; margin-bottom: 18px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            -webkit-appearance: none;
        }

        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary { background: var(--gradient-1); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); }

        /* Loading animation */
        .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
        .typing-indicator span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Markdown in chat */
        .message-bubble p { margin-bottom: 8px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble code { background: rgba(59, 130, 246, 0.1); padding: 2px 5px; border-radius: 4px; font-size: 13px; }
        .message-bubble pre { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 8px 0; }
        .message-bubble pre code { background: none; padding: 0; }
        .message-bubble ul, .message-bubble ol { padding-left: 18px; margin: 8px 0; }
        .message-bubble li { margin-bottom: 4px; }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav { padding: 0 12px; }
            .nav-inner { height: 50px; gap: 12px; }
            .nav-logo { font-size: 16px; }
            .nav-logo svg { width: 20px; height: 20px; }
            .nav-tabs-desktop { display: none; }
            .mobile-tabs { display: block; }

            .main {
                padding-top: 62px;
                padding-left: 14px;
                padding-right: 14px;
                padding-bottom: calc(70px + var(--safe-bottom));
            }

            .page-header { margin-bottom: 16px; }
            .page-header h1 { font-size: 20px; }
            .page-header p { font-size: 13px; }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .card { padding: 14px; }
            .card-icon { width: 36px; height: 36px; font-size: 15px; }
            .card-title { font-size: 14px; }
            .card-desc { font-size: 12px; margin-bottom: 10px; }
            .tag { font-size: 10px; padding: 2px 8px; }

            .filter-bar { gap: 6px; margin-bottom: 14px; }
            .filter-btn { padding: 5px 11px; font-size: 12px; }
            .search-input { min-width: 120px; font-size: 13px; padding: 7px 12px; }

            .news-item { padding: 12px; gap: 10px; }
            .news-date { min-width: 38px; }
            .news-date .day { font-size: 18px; }
            .news-content h3 { font-size: 13px; }
            .news-content p { font-size: 12px; }

            .chat-container {
                height: calc(100vh - 126px);
                height: calc(100dvh - 126px);
                border-radius: 12px;
            }

            .chat-header { padding: 10px 12px; gap: 8px; }
            .chat-header .chat-title { font-size: 14px; }
            .chat-header .model-select { font-size: 12px; padding: 4px 8px; }

            .chat-messages { padding: 12px; gap: 10px; }
            .message { max-width: 90%; gap: 8px; }
            .message-avatar { width: 26px; height: 26px; font-size: 10px; border-radius: 6px; }
            .message-bubble { padding: 9px 12px; font-size: 13px; border-radius: 10px; }

            .chat-input-area { padding: 10px 12px; gap: 8px; }
            .chat-input { font-size: 14px; padding: 9px 12px; min-height: 38px; border-radius: 10px; }
            .send-btn { width: 38px; height: 38px; border-radius: 10px; }

            .modal { padding: 20px; border-radius: 14px; }
            .modal h2 { font-size: 16px; }
        }

        @media (max-width: 375px) {
            .main { padding-left: 10px; padding-right: 10px; }
            .card { padding: 12px; }
            .filter-btn { padding: 4px 9px; font-size: 11px; }
            .news-item { flex-direction: column; gap: 6px; }
            .news-date { text-align: left; display: flex; gap: 6px; align-items: baseline; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Top Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
                    <defs><linearGradient id="grad"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                AI Hub
            </div>
            <div class="nav-tabs-desktop">
                <button class="nav-tab active" data-page="news">行业动态</button>
                <button class="nav-tab" data-page="models">模型大全</button>
                <button class="nav-tab" data-page="tools">工具导航</button>
                <button class="nav-tab" data-page="chat">AI助手</button>
            </div>
            <div class="nav-right">
                <button class="settings-btn" onclick="showSettings()" aria-label="设置">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Bottom Tab Bar -->
    <div class="mobile-tabs">

        grid.innerHTML = filtered.map(model => {

    document.getElementById('modelSearch').addEventListener('input', (e) => {
        const active = document.querySelector('#page-models .filter-btn.active');
        renderModels(active?.dataset.category || 'all', e.target.value);
    });
    renderModels();

    // ============ TOOLS ============
    function renderTools(scene = 'all', search = '') {
        const grid = document.getElementById('toolsGrid');
        let filtered = toolsData;
        if (scene !== 'all') filtered = filtered.filter(t => t.scene === scene);
        if (search) {
            const s = search.toLowerCase();
            filtered = filtered.filter(t => t.name.toLowerCase().includes(s) || t.desc.toLowerCase().includes(s));
        }
        const labels = { coding: '编程', image: '图像', video: '视频', writing: '写作', productivity: '效率', music: '音乐' };
        grid.innerHTML = filtered.map(tool => `<div class="card">
            <div class="card-header">
                <div class="card-icon" style="background:${tool.color}20;color:${tool.color === '#000' ? '#94a3b8' : (tool.color === '#fff' ? '#e2e8f0' : tool.color)}">${tool.name.charAt(0)}</div>
                <div><div class="card-title">${tool.name}</div><div class="card-subtitle">${labels[tool.scene] || tool.scene} · ${tool.link}</div></div>
            </div>
            <div class="card-desc">${tool.desc}</div>
            <div class="card-tags">${tool.strengths.map((s, i) => `<span class="tag ${['','green','purple','orange'][i%4]}">${s}</span>`).join('')}</div>
        </div>`).join('');
    }

    document.querySelectorAll('#page-tools .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#page-tools .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTools(btn.dataset.scene, document.getElementById('toolSearch').value);
        });
    });
    document.getElementById('toolSearch').addEventListener('input', (e) => {
        const active = document.querySelector('#page-tools .filter-btn.active');
        renderTools(active?.dataset.scene || 'all', e.target.value);
    });
    renderTools();

    // ============ CHAT ============
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function updateApiStatus() {
        const el = document.getElementById('apiStatus');
        if (settings.apiKey) {
            el.textContent = '已连接';
            el.style.color = '#34d399';
        } else {
            el.textContent = '未配置';
            el.style.color = 'var(--text-muted)';
        }
    }
    updateApiStatus();

    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });

    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="message-avatar">${role === 'user' ? '你' : 'AI'}</div><div class="message-bubble">${formatMessage(content)}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addTyping() {
        const div = document.createElement('div');
        div.className = 'message assistant'; div.id = 'typing';
        div.innerHTML = `<div class="message-avatar">AI</div><div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() { document.getElementById('typing')?.remove(); }

    function formatMessage(text) {
        text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\n/g, '<br>');
        return text;
    }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        if (!settings.apiKey) {
            addMessage('user', text);
            chatInput.value = ''; chatInput.style.height = 'auto';
            setTimeout(() => addMessage('assistant', '请先在设置中配置API Key后开始对话。'), 400);
            return;
        }

        addMessage('user', text);
        chatInput.value = ''; chatInput.style.height = 'auto';
        sendBtn.disabled = true;
        conversationHistory.push({ role: 'user', content: text });
        addTyping();

        try {
            const response = await callAPI(conversationHistory);
            removeTyping();
            addMessage('assistant', response);
            conversationHistory.push({ role: 'assistant', content: response });
        } catch (err) {
            removeTyping();
            addMessage('assistant', '请求失败: ' + err.message);
        }
        sendBtn.disabled = false;
    }

    async function callAPI(messages) {
        let url, headers, body;
        const sys = { role: 'system', content: '你是一个有帮助的AI助手，用中文简洁地回答问题。' };

        switch (settings.provider) {
            case 'deepseek':
                url = 'https://api.deepseek.com/chat/completions';
                body = { model: 'deepseek-chat', messages: [sys, ...messages], max_tokens: 2048, temperature: 0.7 };
                break;
            case 'qwen':
                url = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
                body = { model: 'qwen-plus', messages: [sys, ...messages], max_tokens: 2048 };
                break;
            case 'doubao':
                url = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
                body = { model: 'doubao-pro-32k', messages: [sys, ...messages], max_tokens: 2048 };
                break;
            case 'custom':
                url = settings.customUrl;
                body = { model: settings.customModel || 'gpt-3.5-turbo', messages: [sys, ...messages], max_tokens: 2048 };
                break;
        }
        headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` };

        const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        return data.choices[0].message.content;
    }

    // ============ SETTINGS ============
    function showSettings() {
        document.getElementById('settingsModal').classList.add('show');
        document.getElementById('apiProvider').value = settings.provider;
        document.getElementById('apiKey').value = settings.apiKey;
        document.getElementById('customUrl').value = settings.customUrl;
        document.getElementById('customModel').value = settings.customModel;
        toggleCustom();
    }

    function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

    function saveSettings() {
        settings.provider = document.getElementById('apiProvider').value;
        settings.apiKey = document.getElementById('apiKey').value;
        settings.customUrl = document.getElementById('customUrl').value;
        settings.customModel = document.getElementById('customModel').value;
        updateApiStatus();
        closeSettings();
    }

    function toggleCustom() {
        const show = document.getElementById('apiProvider').value === 'custom';
        document.getElementById('customUrlGroup').style.display = show ? 'block' : 'none';
        document.getElementById('customModelGroup').style.display = show ? 'block' : 'none';
    }

    document.getElementById('apiProvider').addEventListener('change', toggleCustom);
    document.getElementById('settingsModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeSettings(); });
    document.getElementById('chatModelSelect').addEventListener('change', (e) => { settings.provider = e.target.value; updateApiStatus(); });
    </script>
</body>
</html>
